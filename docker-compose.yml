version: "3.9"

services:

  backend:
    build: ./Backend
    container_name: medvault_backend

    ports:
      - "5000:5000"

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/medvault

  frontend:
    build: ./Frontend
    container_name: medvault_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

  postgres:
    image: postgres:16

    container_name: medvault_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: medvault

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest

    container_name: medvault_redis

    ports:
      - "6380:6379"

volumes:
  postgres_data: